<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>桌面清洁小车 — 底盘布局图</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;700;900&family=Orbitron:wght@700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #1a1a2e;
    --panel: #16213e;
    --accent: #0f3460;
    --highlight: #e94560;
    --cyan: #00d2ff;
    --green: #00e676;
    --yellow: #ffd600;
    --orange: #ff6d00;
    --text: #e0e0e0;
    --chassis: #4a90d9;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans SC', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  h1 {
    font-family: 'Orbitron', 'Noto Sans SC', sans-serif;
    text-align: center;
    padding: 30px 20px 10px;
    font-size: 1.6rem;
    color: var(--cyan);
    letter-spacing: 2px;
    text-shadow: 0 0 20px rgba(0,210,255,0.3);
  }

  .subtitle {
    text-align: center;
    color: #888;
    font-size: 0.9rem;
    margin-bottom: 20px;
  }

  .views {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 30px;
    padding: 10px 20px 40px;
  }

  .view-card {
    background: var(--panel);
    border: 1px solid var(--accent);
    border-radius: 16px;
    padding: 20px;
    min-width: 420px;
    max-width: 500px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
  }

  .view-card h2 {
    color: var(--yellow);
    font-size: 1.1rem;
    margin-bottom: 15px;
    text-align: center;
    padding-bottom: 10px;
    border-bottom: 1px solid var(--accent);
  }

  svg { display: block; margin: 0 auto; }

  .legend {
    background: var(--panel);
    border: 1px solid var(--accent);
    border-radius: 16px;
    padding: 20px 30px;
    margin: 0 auto 30px;
    max-width: 1060px;
  }

  .legend h3 {
    color: var(--cyan);
    margin-bottom: 12px;
    font-size: 1rem;
  }

  .legend-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 8px;
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 0.85rem;
  }

  .legend-dot {
    width: 14px;
    height: 14px;
    border-radius: 3px;
    flex-shrink: 0;
  }

  .flow-section {
    background: var(--panel);
    border: 1px solid var(--accent);
    border-radius: 16px;
    padding: 20px 30px;
    margin: 0 auto 30px;
    max-width: 1060px;
  }

  .flow-section h3 {
    color: var(--green);
    margin-bottom: 15px;
    font-size: 1rem;
  }

  .tab-btns {
    display: flex;
    gap: 10px;
    justify-content: center;
    margin: 10px 0 20px;
  }

  .tab-btn {
    background: var(--accent);
    color: var(--text);
    border: 1px solid #335;
    border-radius: 8px;
    padding: 8px 20px;
    font-size: 0.9rem;
    font-family: 'Noto Sans SC', sans-serif;
    cursor: pointer;
    transition: all 0.2s;
  }

  .tab-btn:hover, .tab-btn.active {
    background: var(--highlight);
    border-color: var(--highlight);
    color: #fff;
  }
</style>
</head>
<body>

<h1>桌面清洁小车 — 底盘布局图</h1>
<p class="subtitle">亚克力底板尺寸参考：约 150mm × 120mm（可根据实际调整）</p>

<div class="tab-btns">
  <button class="tab-btn active" onclick="showView('both')">两个视图</button>
  <button class="tab-btn" onclick="showView('bottom')">只看底部</button>
  <button class="tab-btn" onclick="showView('top')">只看顶部</button>
</div>

<div class="views" id="views">

  <!-- 底部视图（翻过来看） -->
  <div class="view-card" id="view-bottom">
    <h2>底部视图（把小车翻过来看）</h2>
    <svg width="420" height="520" viewBox="0 0 420 520">
      <!-- 底板轮廓 -->
      <rect x="60" y="30" width="300" height="460" rx="20" ry="20"
            fill="none" stroke="#4a90d9" stroke-width="3" stroke-dasharray="8,4" opacity="0.6"/>
      <rect x="60" y="30" width="300" height="460" rx="20" ry="20"
            fill="#4a90d9" opacity="0.08"/>

      <!-- 前进方向箭头 -->
      <defs>
        <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
          <polygon points="0 0, 10 3.5, 0 7" fill="#888"/>
        </marker>
      </defs>
      <line x1="210" y1="15" x2="210" y2="2" stroke="#888" stroke-width="2" marker-end="url(#arrowhead)"/>
      <text x="210" y="28" fill="#888" font-size="11" text-anchor="middle">前进方向 ↑</text>

      <!-- 悬崖传感器（底部最前面） -->
      <g>
        <rect x="90" y="45" width="30" height="18" rx="3" fill="#e94560" opacity="0.9"/>
        <text x="105" y="57" fill="#fff" font-size="8" text-anchor="middle" font-weight="bold">左眼</text>

        <rect x="195" y="45" width="30" height="18" rx="3" fill="#e94560" opacity="0.9"/>
        <text x="210" y="57" fill="#fff" font-size="8" text-anchor="middle" font-weight="bold">中眼</text>

        <rect x="300" y="45" width="30" height="18" rx="3" fill="#e94560" opacity="0.9"/>
        <text x="315" y="57" fill="#fff" font-size="8" text-anchor="middle" font-weight="bold">右眼</text>

        <text x="210" y="80" fill="#e94560" font-size="10" text-anchor="middle">TCRT5000 ×3 朝下看桌面</text>
      </g>

      <!-- 旋转毛刷 -->
      <g>
        <ellipse cx="210" cy="120" rx="65" ry="25" fill="none" stroke="#00e676" stroke-width="2.5" stroke-dasharray="6,3"/>
        <ellipse cx="210" cy="120" rx="65" ry="25" fill="#00e676" opacity="0.1"/>
        <circle cx="210" cy="120" r="8" fill="#00e676" opacity="0.7"/>
        <text x="210" y="124" fill="#fff" font-size="8" text-anchor="middle">轴</text>

        <!-- 刷毛示意 -->
        <line x1="150" y1="115" x2="140" y2="108" stroke="#00e676" stroke-width="1.5" opacity="0.6"/>
        <line x1="155" y1="108" x2="145" y2="100" stroke="#00e676" stroke-width="1.5" opacity="0.6"/>
        <line x1="265" y1="115" x2="275" y2="108" stroke="#00e676" stroke-width="1.5" opacity="0.6"/>
        <line x1="260" y1="108" x2="270" y2="100" stroke="#00e676" stroke-width="1.5" opacity="0.6"/>

        <text x="210" y="155" fill="#00e676" font-size="11" text-anchor="middle" font-weight="bold">旋转毛刷</text>
        <text x="210" y="168" fill="#00e676" font-size="9" text-anchor="middle">280电机带动，扫碎屑到后面</text>
      </g>

      <!-- 280 电机（刷子的驱动） -->
      <g>
        <rect x="310" y="100" width="40" height="28" rx="4" fill="#ff6d00" opacity="0.85"/>
        <text x="330" y="118" fill="#fff" font-size="8" text-anchor="middle" font-weight="bold">280</text>
        <text x="330" y="140" fill="#ff6d00" font-size="9" text-anchor="middle">刷子电机</text>
        <!-- 连接线到刷子 -->
        <line x1="310" y1="114" x2="275" y2="120" stroke="#ff6d00" stroke-width="1" stroke-dasharray="3,2"/>
      </g>

      <!-- 5015 鼓风机 -->
      <g>
        <rect x="165" y="190" width="90" height="70" rx="8" fill="#00d2ff" opacity="0.2" stroke="#00d2ff" stroke-width="2"/>
        <circle cx="210" cy="220" r="22" fill="none" stroke="#00d2ff" stroke-width="1.5" stroke-dasharray="4,2"/>
        <circle cx="210" cy="220" r="5" fill="#00d2ff" opacity="0.6"/>
        <!-- 进风箭头（从桌面吸上来） -->
        <line x1="210" y1="248" x2="210" y2="260" stroke="#00d2ff" stroke-width="1.5"/>
        <polygon points="205,260 215,260 210,268" fill="#00d2ff" opacity="0.6"/>
        <text x="210" y="280" fill="#00d2ff" font-size="9" text-anchor="middle">↑ 从桌面吸碎屑</text>

        <!-- 出风口 -->
        <rect x="255" y="210" width="15" height="20" rx="2" fill="#00d2ff" opacity="0.4"/>
        <line x1="270" y1="220" x2="290" y2="220" stroke="#00d2ff" stroke-width="1.5" marker-end="url(#arrowhead)"/>

        <text x="210" y="198" fill="#00d2ff" font-size="11" text-anchor="middle" font-weight="bold">5015 鼓风机</text>
      </g>

      <!-- 收集盒 -->
      <g>
        <rect x="290" y="190" width="60" height="70" rx="6" fill="#ffd600" opacity="0.15" stroke="#ffd600" stroke-width="2"/>
        <text x="320" y="218" fill="#ffd600" font-size="10" text-anchor="middle" font-weight="bold">收集盒</text>
        <text x="320" y="233" fill="#ffd600" font-size="8" text-anchor="middle">碎屑存这里</text>
        <text x="320" y="248" fill="#ffd600" font-size="8" text-anchor="middle">← 风从这进</text>
        <!-- 滤网 -->
        <line x1="295" y1="255" x2="345" y2="255" stroke="#ffd600" stroke-width="1" stroke-dasharray="2,2"/>
        <text x="320" y="266" fill="#ffd600" font-size="7" text-anchor="middle" opacity="0.7">纱布滤网</text>
      </g>

      <!-- 左电机 + 轮子 -->
      <g>
        <rect x="30" y="310" width="45" height="80" rx="10" fill="#fff" opacity="0.15" stroke="#fff" stroke-width="2"/>
        <text x="52" y="345" fill="#fff" font-size="9" text-anchor="middle" font-weight="bold">左轮</text>
        <rect x="75" y="325" width="35" height="50" rx="4" fill="#ff6d00" opacity="0.7"/>
        <text x="92" y="348" fill="#fff" font-size="7" text-anchor="middle">N20</text>
        <text x="92" y="360" fill="#fff" font-size="7" text-anchor="middle">左电机</text>
      </g>

      <!-- 右电机 + 轮子 -->
      <g>
        <rect x="345" y="310" width="45" height="80" rx="10" fill="#fff" opacity="0.15" stroke="#fff" stroke-width="2"/>
        <text x="367" y="345" fill="#fff" font-size="9" text-anchor="middle" font-weight="bold">右轮</text>
        <rect x="310" y="325" width="35" height="50" rx="4" fill="#ff6d00" opacity="0.7"/>
        <text x="327" y="348" fill="#fff" font-size="7" text-anchor="middle">N20</text>
        <text x="327" y="360" fill="#fff" font-size="7" text-anchor="middle">右电机</text>
      </g>

      <!-- 轮子位置标注 -->
      <text x="210" y="365" fill="#888" font-size="9" text-anchor="middle">← 两个驱动轮在中部偏后 →</text>

      <!-- 万向轮 -->
      <g>
        <circle cx="210" cy="450" r="12" fill="none" stroke="#aaa" stroke-width="2"/>
        <circle cx="210" cy="450" r="5" fill="#aaa" opacity="0.5"/>
        <text x="210" y="475" fill="#aaa" font-size="10" text-anchor="middle">万向球轮（尾部支撑）</text>
      </g>

      <!-- 气流箭头 -->
      <g opacity="0.5">
        <text x="60" y="230" fill="#00d2ff" font-size="22" transform="rotate(-90 60 230)">→→→</text>
        <text x="30" y="180" fill="#00d2ff" font-size="9" text-anchor="middle" transform="rotate(-90 30 180)">碎屑气流方向</text>
      </g>
    </svg>
  </div>

  <!-- 顶部视图 -->
  <div class="view-card" id="view-top">
    <h2>顶部视图（从上往下看）</h2>
    <svg width="420" height="520" viewBox="0 0 420 520">
      <!-- 底板轮廓 -->
      <rect x="60" y="30" width="300" height="460" rx="20" ry="20"
            fill="none" stroke="#4a90d9" stroke-width="3" stroke-dasharray="8,4" opacity="0.6"/>
      <rect x="60" y="30" width="300" height="460" rx="20" ry="20"
            fill="#4a90d9" opacity="0.08"/>

      <!-- 前进方向 -->
      <line x1="210" y1="15" x2="210" y2="2" stroke="#888" stroke-width="2" marker-end="url(#arrowhead)"/>
      <text x="210" y="28" fill="#888" font-size="11" text-anchor="middle">前进方向 ↑</text>

      <!-- 超声波传感器 -->
      <g>
        <rect x="170" y="38" width="80" height="30" rx="5" fill="#e94560" opacity="0.8"/>
        <circle cx="192" cy="53" r="8" fill="#e94560" stroke="#fff" stroke-width="1"/>
        <circle cx="228" cy="53" r="8" fill="#e94560" stroke="#fff" stroke-width="1"/>
        <text x="210" y="56" fill="#fff" font-size="7" text-anchor="middle" font-weight="bold">HC-SR04</text>
        <text x="210" y="82" fill="#e94560" font-size="10" text-anchor="middle">超声波（朝前看）</text>
      </g>

      <!-- ESP32 -->
      <g>
        <rect x="140" y="100" width="140" height="55" rx="6"
              fill="#0f3460" stroke="#4a90d9" stroke-width="2"/>
        <rect x="155" y="108" width="110" height="30" rx="3" fill="#1a1a2e" opacity="0.5"/>
        <text x="210" y="128" fill="#4a90d9" font-size="12" text-anchor="middle" font-weight="bold">ESP32</text>
        <text x="210" y="148" fill="#4a90d9" font-size="8" text-anchor="middle">主控板（大脑）</text>
        <!-- USB口 -->
        <rect x="197" y="150" width="26" height="8" rx="2" fill="#666"/>
        <text x="210" y="170" fill="#666" font-size="7" text-anchor="middle">USB-C</text>
      </g>

      <!-- TB6612 驱动板 -->
      <g>
        <rect x="85" y="185" width="80" height="45" rx="5"
              fill="#0f3460" stroke="#ff6d00" stroke-width="1.5"/>
        <text x="125" y="210" fill="#ff6d00" font-size="10" text-anchor="middle" font-weight="bold">TB6612</text>
        <text x="125" y="224" fill="#ff6d00" font-size="8" text-anchor="middle">电机驱动板</text>
      </g>

      <!-- MOS 管模块 ×2 -->
      <g>
        <rect x="250" y="185" width="80" height="45" rx="5"
              fill="#0f3460" stroke="#00e676" stroke-width="1.5"/>
        <text x="290" y="205" fill="#00e676" font-size="9" text-anchor="middle" font-weight="bold">MOS管 ×2</text>
        <text x="290" y="220" fill="#00e676" font-size="8" text-anchor="middle">控制刷子+风扇</text>
      </g>

      <!-- DFPlayer + 喇叭 -->
      <g>
        <rect x="85" y="250" width="65" height="40" rx="5"
              fill="#0f3460" stroke="#ffd600" stroke-width="1.5"/>
        <text x="117" y="270" fill="#ffd600" font-size="9" text-anchor="middle" font-weight="bold">DFPlayer</text>
        <text x="117" y="283" fill="#ffd600" font-size="7" text-anchor="middle">MP3播放器</text>

        <!-- 喇叭 -->
        <circle cx="177" cy="270" r="20" fill="none" stroke="#ffd600" stroke-width="1.5"/>
        <circle cx="177" cy="270" r="8" fill="#ffd600" opacity="0.2"/>
        <text x="177" y="274" fill="#ffd600" font-size="8" text-anchor="middle">喇叭</text>
      </g>

      <!-- LU-ASR01 语音识别 -->
      <g>
        <rect x="250" y="250" width="80" height="40" rx="5"
              fill="#0f3460" stroke="#e040fb" stroke-width="1.5"/>
        <text x="290" y="268" fill="#e040fb" font-size="9" text-anchor="middle" font-weight="bold">LU-ASR01</text>
        <text x="290" y="282" fill="#e040fb" font-size="7" text-anchor="middle">语音识别（耳朵）</text>
      </g>

      <!-- 降压模块 -->
      <g>
        <rect x="155" y="310" width="110" height="35" rx="5"
              fill="#0f3460" stroke="#00bcd4" stroke-width="1.5"/>
        <text x="210" y="330" fill="#00bcd4" font-size="10" text-anchor="middle" font-weight="bold">LM2596 降压模块</text>
        <text x="210" y="342" fill="#00bcd4" font-size="7" text-anchor="middle">7.4V → 5V</text>
      </g>

      <!-- LED + 蜂鸣器 + 按钮 -->
      <g>
        <circle cx="100" cy="330" r="7" fill="#00e676" opacity="0.8"/>
        <text x="100" y="348" fill="#00e676" font-size="7" text-anchor="middle">绿灯</text>

        <circle cx="130" cy="330" r="7" fill="#e94560" opacity="0.8"/>
        <text x="130" y="348" fill="#e94560" font-size="7" text-anchor="middle">红灯</text>

        <rect x="295" y="310" width="30" height="18" rx="3" fill="#aaa" opacity="0.5" stroke="#aaa"/>
        <text x="310" y="322" fill="#fff" font-size="7" text-anchor="middle">蜂鸣器</text>

        <circle cx="345" cy="319" r="10" fill="none" stroke="#fff" stroke-width="2"/>
        <circle cx="345" cy="319" r="4" fill="#fff" opacity="0.3"/>
        <text x="345" y="340" fill="#fff" font-size="7" text-anchor="middle">按钮</text>
      </g>

      <!-- 电池盒 -->
      <g>
        <rect x="120" y="370" width="180" height="70" rx="8"
              fill="#333" stroke="#888" stroke-width="2"/>
        <rect x="135" y="382" width="70" height="45" rx="4" fill="#555" opacity="0.6"/>
        <text x="170" y="410" fill="#ffd600" font-size="10" text-anchor="middle" font-weight="bold">18650</text>
        <rect x="215" y="382" width="70" height="45" rx="4" fill="#555" opacity="0.6"/>
        <text x="250" y="410" fill="#ffd600" font-size="10" text-anchor="middle" font-weight="bold">18650</text>
        <text x="210" y="450" fill="#888" font-size="9" text-anchor="middle">电池盒（串联 7.4V）</text>

        <!-- 开关 -->
        <rect x="130" y="432" width="24" height="10" rx="3" fill="#e94560" opacity="0.7"/>
        <text x="142" y="455" fill="#e94560" font-size="7" text-anchor="middle">开关</text>
      </g>

      <!-- 左右轮位置提示 -->
      <g opacity="0.4">
        <rect x="30" y="310" width="45" height="80" rx="10" fill="none" stroke="#fff" stroke-width="1.5" stroke-dasharray="4,3"/>
        <text x="52" y="355" fill="#fff" font-size="8" text-anchor="middle">左轮</text>
        <text x="52" y="367" fill="#fff" font-size="7" text-anchor="middle">(底部)</text>

        <rect x="345" y="310" width="45" height="80" rx="10" fill="none" stroke="#fff" stroke-width="1.5" stroke-dasharray="4,3"/>
        <text x="367" y="355" fill="#fff" font-size="8" text-anchor="middle">右轮</text>
        <text x="367" y="367" fill="#fff" font-size="7" text-anchor="middle">(底部)</text>
      </g>
    </svg>
  </div>

</div>

<!-- 图例 -->
<div class="legend">
  <h3>图例说明</h3>
  <div class="legend-grid">
    <div class="legend-item">
      <div class="legend-dot" style="background:#e94560"></div>
      <span>传感器（悬崖 TCRT5000 / 超声波 HC-SR04）</span>
    </div>
    <div class="legend-item">
      <div class="legend-dot" style="background:#00e676"></div>
      <span>清扫机构（旋转毛刷 / MOS管模块）</span>
    </div>
    <div class="legend-item">
      <div class="legend-dot" style="background:#ff6d00"></div>
      <span>电机（N20 行走电机 / 280 刷子电机）</span>
    </div>
    <div class="legend-item">
      <div class="legend-dot" style="background:#00d2ff"></div>
      <span>风扇 + 气流系统（5015 鼓风机）</span>
    </div>
    <div class="legend-item">
      <div class="legend-dot" style="background:#ffd600"></div>
      <span>收集盒 / 音频（DFPlayer + 喇叭）</span>
    </div>
    <div class="legend-item">
      <div class="legend-dot" style="background:#4a90d9"></div>
      <span>主控（ESP32 开发板）</span>
    </div>
    <div class="legend-item">
      <div class="legend-dot" style="background:#e040fb"></div>
      <span>语音识别（LU-ASR01）</span>
    </div>
    <div class="legend-item">
      <div class="legend-dot" style="background:#888"></div>

  </div>
</div>

<!-- 清扫气流说明 -->
<div class="flow-section">
  <h3>清扫系统工作原理（侧面剖视图）</h3>
  <svg width="100%" height="220" viewBox="0 0 800 220" style="max-width:800px">
    <!-- 桌面 -->
    <rect x="0" y="180" width="800" height="40" fill="#5d4e37" opacity="0.3"/>
    <text x="400" y="205" fill="#8d7e67" font-size="14" text-anchor="middle">桌面</text>

    <!-- 碎屑 -->
    <circle cx="120" cy="175" r="3" fill="#a0522d" opacity="0.7"/>
    <circle cx="140" cy="178" r="2" fill="#a0522d" opacity="0.7"/>
    <circle cx="155" cy="176" r="2.5" fill="#a0522d" opacity="0.7"/>
    <circle cx="170" cy="174" r="3" fill="#a0522d" opacity="0.6"/>

<script>
function showView(view) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');

  const bottom = document.getElementById('view-bottom');
  const top = document.getElementById('view-top');

  if (view === 'both') {
    bottom.style.display = 'block';
    top.style.display = 'block';
  } else if (view === 'bottom') {
    bottom.style.display = 'block';
    top.style.display = 'none';
  } else {
    bottom.style.display = 'none';
    top.style.display = 'block';
  }
}
</script>
